[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]

[phases.install]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install -r server/requirements.txt",
  "npm run build"
]

[start]
cmd = "/app/.venv/bin/uvicorn app.main:app --host=0.0.0.0 --port=$PORT --app-dir server"
